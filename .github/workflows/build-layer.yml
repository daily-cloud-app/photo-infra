name: Build Pillow Lambda Layer

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-layer.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow for Lambda Layer
        run: |
          mkdir -p python
          pip install pillow -t python/
          zip -r pillow-layer.zip python/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: layer-v${{ github.run_number }}
          name: Pillow Layer v${{ github.run_number }}
          files: pillow-layer.zip
          body: |
            Auto-generated Pillow Lambda Layer for Python 3.12.
            Upload this ZIP as a Lambda Layer in your AWS account.
